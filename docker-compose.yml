services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mayday
      POSTGRES_PASSWORD: mayday
      POSTGRES_DB: mayday
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mayday -d mayday"]
      interval: 5s
      timeout: 5s
      retries: 10

  mayday-server:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "3001"
      DATABASE_URL: postgres://mayday:mayday@postgres:5432/mayday?sslmode=disable
      LOG_LEVEL: info
    ports:
      - "3001:3001"

volumes:
  postgres_data: {}
